name: ai_tech
description: "Assistant IA 100% on-device — Files Tech"
publish_to: 'none'
version: 0.9.0+16

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Code partagé Files Tech (RecentFiles, UpdateService, CloudShareRow,
  # LegalSupportSections, FormatUtils, PathSafe, PathUtils 0.3.0+).
  files_tech_core:
    path: ../files_tech_core

  # LiteRT-LM / MediaPipe LLM Inference (Gemma 3 / 3n / 4, .task / .litertlm).
  # 0.15.0 : ModelType.gemma4, MTP / speculative decoding, native system role.
  flutter_gemma: ^0.15.0

  # Picker pour charger le modèle .task depuis le stockage utilisateur.
  file_picker: ^8.1.2

  # Stockage privé scoped à l'app (chats chiffrés, modèles dérivés).
  path_provider: ^2.1.4

  # Stockage local : préférences + chiffrement historique chat.
  shared_preferences: ^2.3.2
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  # AccumulatorSink<Digest> pour le calcul SHA-256 streaming dans
  # `ModelInstaller`.
  convert: ^3.1.1

  # i18n (FR/EN)
  intl: ^0.20.2

  # UI
  share_plus: ^10.0.3

  # Version de l'app — source unique depuis pubspec
  package_info_plus: ^9.0.0

  # Clé de chiffrement persistée dans Android Keystore (chats chiffrés AES-GCM).
  flutter_secure_storage: ^10.0.0

  # Pages légales et liens utiles (utilisés par AboutScreen via files_tech_core).
  flutter_markdown: ^0.7.4
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Mock de path_provider pour les tests unitaires
  # (déjà transitivement présent via path_provider).
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/legal/
    - assets/icon/
